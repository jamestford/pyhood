name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 6am UTC
    - cron: "0 6 * * 1"

jobs:
  bandit:
    name: Bandit (Code Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r pyhood/ -f json -o bandit-report.json || true

      - name: Display results
        run: bandit -r pyhood/ -ll -ii

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit (Dependency Vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Audit runtime dependencies only
        run: |
          python -m venv /tmp/audit-env
          /tmp/audit-env/bin/pip install .
          /tmp/audit-env/bin/pip freeze | grep -iv '^pyhood==' > runtime-reqs.txt
          pip install pip-audit
          pip-audit --strict --desc -r runtime-reqs.txt

  codeql:
    name: CodeQL (Static Analysis)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
